<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>メーカー一覧</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            width: 80%;
            margin: 30px auto;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            display: inline-block;
            background-color: #d0e7ff;
            padding: 10px 15px;
            border-radius: 8px;
            text-decoration: none;
            color: #333;
        }

        h2 {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ccc;
            text-align: left;
        }

        th {
            background-color: #e0f0ff;
        }

        .button {
            background-color: #d0e7ff;
            border: 1px solid #aaa;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            color: #333;
            text-decoration: none;
            cursor: pointer;
            margin-right: 10px;
            display: inline-block;
        }

        .button:hover {
            background-color: #aacbe5;
        }

        .button-group {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <a href="/main" class="logo">geek商品管理システム</a>

    <h2>メーカー一覧</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>メーカー名</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="manufacturer : ${manufacturers}">
                <td>
                    <a th:href="@{'/manufacturer/detail/' + ${manufacturer.id}}" th:text="${manufacturer.id}">1</a>
                </td>
                <td th:text="${manufacturer.name}">メーカー名</td>
            </tr>
        </tbody>
    </table>

    <div class="button-group">
        <div sec:authorize="hasAuthority('管理者')">
            <a href="/manufacturer/create" class="button">新規作成</a>
        </div>
        <a href="/main" class="button">戻る</a>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${manufacturer.id == 0 ? 'メーカー新規作成' : 'メーカー編集'}">メーカー登録</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            width: 80%;
            margin: 0 auto;
            padding: 20px;
        }

        .logo {
            font-size: 36px;
            font-weight: bold;
            padding: 15px;
            margin: 10px 0;
            background-color: #d0e7ff;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            display: inline-block;
        }

        .logo:hover {
            background-color: #aacbe5;
        }

        h2 {
            margin-top: 20px;
        }

        form {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .button-group {
            margin-top: 20px;
        }

        .button {
            background-color: #d0e7ff;
            border: 1px solid #aaa;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            color: #333;
            text-decoration: none;
            cursor: pointer;
            margin-right: 10px;
        }

        .button:hover {
            background-color: #aacbe5;
        }
    </style>
</head>
<body>
<div class="container">

    <a th:href="@{/main}" class="logo">geek商品管理システム</a>

    <h2 th:text="${manufacturer.id == 0 ? 'メーカー新規作成' : 'メーカー編集'}">メーカー登録</h2>

    <form th:action="@{${manufacturer.id == 0 ? '/manufacturer/create' : '/manufacturer/edit/' + manufacturer.id}}" method="post" th:object="${manufacturer}">
        <label for="name">メーカー名</label>
        <input type="text" id="name" th:field="*{name}" required>

        <div class="button-group">
            <button type="submit" class="button" th:text="${manufacturer.id == 0 ? '登録' : '更新'}">送信</button>
            <a th:href="@{/manufacturer}" class="button">戻る</a>
        </div>
    </form>

</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>管理者編集</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            width: 80%;
            margin: 0 auto;
            padding: 20px;
        }

        .logo {
            font-size: 36px;
            font-weight: bold;
            padding: 15px;
            margin-bottom: 30px;
            background-color: #d0e7ff;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            display: inline-block;
        }

        h2 {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: inline-block;
            width: 100px;
        }

        input, select {
            padding: 8px;
            width: 300px;
        }

        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        .button {
            background-color: #d0e7ff;
            border: 1px solid #aaa;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            color: #333;
        }

        .button:hover {
            background-color: #aacbe5;
        }
    </style>
</head>
<body>
<div class="container">
    <a th:href="@{/main}" class="logo">geek商品管理システム</a>

    <h2>管理者編集</h2>
	<form th:action="@{'/admin/manage/' + ${admin.id} + '/edit'}" method="post" th:object="${admin}">
		<input type="hidden" th:field="*{id}"/>
		<div class="form-group">
		    <label for="lastName">姓:</label>
			<input type="text" id="lastName" th:field="*{lastName}" required>
		    <div th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" style="color:red;"></div>
		</div>

		<div class="form-group">
		    <label for="firstName">名:</label>
			<input type="text" id="firstName" th:field="*{firstName}" maxlength="50" required>
		    <div th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" style="color:red;"></div>
		</div>

		<div class="form-group">
		    <label for="email">メール:</label>
			<input type="email" id="email" th:field="*{email}" maxlength="255" required>
		    <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:red;"></div>
		</div>

		<div class="form-group">
		    <label for="phoneNumber">電話番号:</label>
			<input type="text" id="phoneNumber" th:field="*{phoneNumber}" maxlength="20">
		    <div th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" style="color:red;"></div>
		</div>
		
		<div class="form-group">
		    <label for="store">店舗:</label>
		    <select id="store" th:field="*{store.id}" required>
		        <option value="">選択してください</option>
		        <option th:each="store : ${stores}"
		                th:value="${store.id}"
		                th:text="${store.name}">
		        </option>
		    </select>
		</div>

		<div class="form-group">
		    <label for="role">権限:</label>
		    <select id="role" th:field="*{role.id}" required>
		        <option value="">選択してください</option>
		        <option th:each="role : ${roles}"
		                th:value="${role.id}"
		                th:text="${role.name}">
		        </option>
		    </select>
		</div>

		<div class="form-group">
		    <label for="position">役職:</label>
		    <select id="position" th:field="*{position.id}" required>
		        <option value="">選択してください</option>
		        <option th:each="position : ${positions}"
		                th:value="${position.id}"
		                th:text="${position.name}">
		        </option>
		    </select>
		</div>

        <div class="button-group">
            <button type="submit" class="button">保存</button>
            <a th:href="@{/admin/manage}" class="button">戻る</a>
        </div>
    </form>
</div>
</body>
</html>

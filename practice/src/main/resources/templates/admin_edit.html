<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>管理者編集</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            width: 80%;
            margin: 0 auto;
            padding: 20px;
        }

        .logo {
            font-size: 36px;
            font-weight: bold;
            padding: 15px;
            margin-bottom: 30px;
            background-color: #d0e7ff;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            display: inline-block;
        }

        h2 {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: inline-block;
            width: 100px;
        }

        input, select {
            padding: 8px;
            width: 300px;
        }

        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        .button {
            background-color: #d0e7ff;
            border: 1px solid #aaa;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            color: #333;
        }

        .button:hover {
            background-color: #aacbe5;
        }
    </style>
</head>
<body>
<div class="container">
    <a th:href="@{/main}" class="logo">geek商品管理システム</a>

    <h2>管理者編集</h2>

	<form th:action="@{'/admin/manage/' + ${admin.id} + '/edit'}" method="post" th:object="${admin}">
        <input type="hidden" th:field="*{id}"/>

        <div class="form-group">
            <label>姓:</label>
            <input type="text" th:field="*{lastName}" required>
        </div>
        <div class="form-group">
            <label>名:</label>
            <input type="text" th:field="*{firstName}" required>
        </div>
        <div class="form-group">
            <label>メール:</label>
            <input type="email" th:field="*{email}" required>
        </div>
        <div class="form-group">
            <label>電話番号:</label>
            <input type="text" th:field="*{phoneNumber}">
        </div>
        <div class="form-group">
            <label>店舗:</label>
            <select th:field="*{store.id}" required>
                <option value="">選択してください</option>
                <option th:each="store : ${stores}"
                        th:value="${store.id}"
                        th:text="${store.name}"
                        th:selected="${store.id == admin.store.id}">
                </option>
            </select>
        </div>
        <div class="form-group">
            <label>権限:</label>
            <select th:field="*{role.id}" required>
                <option value="">選択してください</option>
                <option th:each="role : ${roles}"
                        th:value="${role.id}"
                        th:text="${role.name}"
                        th:selected="${role.id == admin.role.id}">
                </option>
            </select>
        </div>
        <div class="form-group">
            <label>役職:</label>
            <select th:field="*{position.id}" required>
                <option value="">選択してください</option>
                <option th:each="position : ${positions}"
                        th:value="${position.id}"
                        th:text="${position.name}"
                        th:selected="${position.id == admin.position.id}">
                </option>
            </select>
        </div>

        <div class="button-group">
            <button type="submit" class="button">保存</button>
            <a th:href="@{/admin/manage}" class="button">戻る</a>
        </div>
    </form>
</div>
</body>
</html>

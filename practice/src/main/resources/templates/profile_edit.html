<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>プロフィール編集</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            width: 80%;
            margin: 0 auto;
            padding: 20px;
        }

        h2 {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            margin-right: 10px;
        }

        input[type="text"], input[type="email"], select {
            padding: 8px;
            width: 300px;
            margin: 5px 0;
        }

        .button {
            background-color: #d0e7ff;
            border: 1px solid #aaa;
            padding: 8px 12px;
            border-radius: 5px;
            text-align: center;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            color: #333;
        }

        .button:hover {
            background-color: #aacbe5;
        }

        .logo {
            font-size: 36px;
            font-weight: bold;
            padding: 15px;
            margin: 10px;
            background-color: #d0e7ff;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
        }

        .logo:hover {
            color: #666;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ロゴ -->
        <a th:href="@{/main}" class="logo">geek商品管理システム</a>
        
        <h2>プロフィール編集</h2>
        <form th:action="@{/profile/edit}" method="post">
            <!-- IDをhiddenで送信 -->
            <input type="hidden" name="id" th:value="${admin.id}"/>
            
            <div class="form-group">
                <label>姓:</label>
                <input type="text" name="lastName" th:value="${admin.lastName}" required>
            </div>
            <div class="form-group">
                <label>名:</label>
                <input type="text" name="firstName" th:value="${admin.firstName}" required>
            </div>
            <div class="form-group">
                <label>メール:</label>
                <input type="email" name="email" th:value="${admin.email}" required>
            </div>
            <div class="form-group">
                <label>電話番号:</label>
                <input type="text" name="phoneNumber" th:value="${admin.phoneNumber}">
            </div>

            <!-- 店舗 -->
            <div class="form-group">
                <label>店舗:</label>
                <select name="store.id">
                    <th:block th:each="store : ${stores}">
                        <option th:value="${store.id}" th:text="${store.name}" 
                                th:selected="${store.id} == ${admin.store.id}"></option>
                    </th:block>
                </select>
            </div>

            <!-- 権限 -->
            <div class="form-group">
                <label>権限:</label>
                <select name="role.id">
                    <th:block th:each="role : ${roles}">
                        <option th:value="${role.id}" th:text="${role.name}"
                                th:selected="${role.id} == ${admin.role.id}"></option>
                    </th:block>
                </select>
            </div>

            <!-- 役職 -->
            <div class="form-group">
                <label>役職:</label>
                <select name="position.id">
                    <th:block th:each="position : ${positions}">
                        <option th:value="${position.id}" th:text="${position.name}"
                                th:selected="${position.id} == ${admin.position.id}"></option>
                    </th:block>
                </select>
            </div>

            <!-- ボタンを横並びに -->
            <div class="button-group">
                <button type="submit" class="button">保存</button>
                <a th:href="@{/profile/detail}" class="button">戻る</a>
            </div>
        </form>
    </div>
</body>
</html>

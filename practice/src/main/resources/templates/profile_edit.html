<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>プロフィール編集</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            width: 80%;
            margin: 0 auto;
            padding: 20px;
        }

        h2 {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            margin-right: 10px;
        }

        input[type="text"], input[type="email"], select {
            padding: 8px;
            width: 300px;
            margin: 5px 0;
        }

        .button {
            background-color: #d0e7ff;
            border: 1px solid #aaa;
            padding: 8px 12px;
            border-radius: 5px;
            text-align: center;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            color: #333;
        }

        .button:hover {
            background-color: #aacbe5;
        }

        .logo {
            font-size: 36px;
            font-weight: bold;
            padding: 15px;
            margin: 10px;
            background-color: #d0e7ff;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
        }

        .logo:hover {
            color: #666;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ロゴ -->
        <a th:href="@{/main}" class="logo">geek商品管理システム</a>
        
        <h2>プロフィール編集</h2>
		<form th:action="@{/profile/edit}" th:object="${admin}" method="post">
		    <!-- IDをhiddenで送信 -->
		    <input type="hidden" th:field="*{id}"/>

		    <div class="form-group">
		        <label>姓:</label>
		        <input type="text" th:field="*{lastName}" required>
		        <div th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" style="color: red;"></div>
		    </div>

		    <div class="form-group">
		        <label>名:</label>
		        <input type="text" th:field="*{firstName}" required>
		        <div th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" style="color: red;"></div>
		    </div>

		    <div class="form-group">
		        <label>メール:</label>
		        <input type="email" th:field="*{email}" required>
		        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: red;"></div>
		    </div>

		    <div class="form-group">
		        <label>電話番号:</label>
		        <input type="text" th:field="*{phoneNumber}">
		        <div th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" style="color: red;"></div>
		    </div>

            <!-- 店舗 -->
            <div class="form-group">
                <label>店舗:</label>
                <select name="store.id">
                    <th:block th:each="store : ${stores}">
                        <option th:value="${store.id}" th:text="${store.name}" 
                                th:selected="${store.id} == ${admin.store.id}"></option>
                    </th:block>
                </select>
            </div>

            <!-- 権限 -->
            <div class="form-group">
                <label>権限:</label>
                <select name="role.id">
                    <th:block th:each="role : ${roles}">
                        <option th:value="${role.id}" th:text="${role.name}"
                                th:selected="${role.id} == ${admin.role.id}"></option>
                    </th:block>
                </select>
            </div>

            <!-- 役職 -->
            <div class="form-group">
                <label>役職:</label>
                <select name="position.id">
                    <th:block th:each="position : ${positions}">
                        <option th:value="${position.id}" th:text="${position.name}"
                                th:selected="${position.id} == ${admin.position.id}"></option>
                    </th:block>
                </select>
            </div>

            <!-- ボタンを横並びに -->
            <div class="button-group">
                <button type="submit" class="button">保存</button>
                <a th:href="@{/profile/detail}" class="button">戻る</a>
            </div>
        </form>
    </div>
</body>
</html>

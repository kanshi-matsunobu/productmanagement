<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>管理者新規作成</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            width: 80%;
            margin: 0 auto;
            padding: 20px;
        }

        .logo {
            font-size: 36px;
            font-weight: bold;
            padding: 15px;
            margin-bottom: 30px;
            background-color: #d0e7ff;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            display: inline-block;
        }

        .logo:hover {
            color: #666;
        }

        h2 {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: inline-block;
            width: 100px;
        }

        input[type="text"], input[type="email"], input[type="password"], select {
            padding: 8px;
            width: 300px;
        }

        .message {
            color: green;
            margin-bottom: 15px;
        }

        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        .button {
            background-color: #d0e7ff;
            border: 1px solid #aaa;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            color: #333;
        }

        .button:hover {
            background-color: #aacbe5;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- ロゴ -->
        <a th:href="@{/main}" class="logo">geek商品管理システム</a>

        <h2>管理者新規作成</h2>
		<!-- エラーメッセージ -->
		<div th:if="${error}" style="color: red; font-weight: bold; margin-bottom: 15px;">
		    <p th:text="${error}"></p>
		</div>
        <!-- 登録フォーム -->
		<form th:action="@{/admin/manage/create}" method="post" th:object="${admin}">
		    <div class="form-group">
		        <label>姓:</label>
		        <input type="text" th:field="*{lastName}" required>
		        <div th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" style="color:red;"></div>
		    </div>
		    <div class="form-group">
		        <label>名:</label>
		        <input type="text" th:field="*{firstName}" required>
		        <div th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" style="color:red;"></div>
		    </div>
		    <div class="form-group">
		        <label>メール:</label>
		        <input type="email" th:field="*{email}" required>
		        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:red;"></div>
		    </div>
		    <div class="form-group">
		        <label>パスワード:</label>
		        <input type="password" th:field="*{password}" required>
		        <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red;"></div>
		    </div>
		    <div class="form-group">
		        <label>電話番号:</label>
		        <input type="text" th:field="*{phoneNumber}">
		        <div th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" style="color:red;"></div>
		    </div>

            <div class="form-group">
                <label>店舗:</label>
                <select name="store.id" required>
                    <option value="">選択してください</option>
                    <th:block th:each="store : ${stores}">
                        <option th:value="${store.id}" th:text="${store.name}"></option>
                    </th:block>
                </select>
            </div>

            <div class="form-group">
                <label>権限:</label>
                <select name="role.id" required>
                    <option value="">選択してください</option>
                    <th:block th:each="role : ${roles}">
                        <option th:value="${role.id}" th:text="${role.name}"></option>
                    </th:block>
                </select>
            </div>

            <div class="form-group">
                <label>役職:</label>
                <select name="position.id" required>
                    <option value="">選択してください</option>
                    <th:block th:each="position : ${positions}">
                        <option th:value="${position.id}" th:text="${position.name}"></option>
                    </th:block>
                </select>
            </div>

            <!-- ボタン -->
            <div class="button-group">
                <button type="submit" class="button">作成</button>
                <a th:href="@{/admin/manage}" class="button">戻る</a>
            </div>
        </form>
    </div>
</body>
</html>

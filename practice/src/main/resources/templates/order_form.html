<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>発注画面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            width: 80%;
            margin: 30px auto;
            padding: 20px;
        }

        .logo {
            font-size: 36px;
            font-weight: bold;
            padding: 15px;
            margin: 10px 0;
            background-color: #d0e7ff;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            display: inline-block;
        }

        .logo:hover {
            background-color: #aacbe5;
        }

        h2 {
            margin-top: 20px;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-top: 30px;
        }

        .form-row label {
            font-weight: bold;
            margin-right: 20px;
        }

        .form-row .product-name {
            margin-right: 40px;
        }

        .form-row input[type="number"] {
            width: 100px;
            padding: 8px;
        }

        .button {
            margin-top: 30px;
            background-color: #d0e7ff;
            border: 1px solid #aaa;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            color: #333;
            text-decoration: none;
            cursor: pointer;
        }

        .button:hover {
            background-color: #aacbe5;
        }
    </style>
</head>
<body>
<div class="container">
    <a th:href="@{/main}" class="logo">geek商品管理システム</a>

    <h2>発注画面</h2>

    <form th:action="@{/product/order/{id}(id=${product.id})}" method="post">
        <div class="form-row">
            <label>商品名：</label>
            <span class="product-name" th:text="${product.name}">商品名</span>

            <label for="quantity">発注数：</label>
            <input type="number" id="quantity" name="quantity" min="1" required>
        </div>

        <button type="submit" class="button">発注する</button>
    </form>
</div>
</body>
</html>

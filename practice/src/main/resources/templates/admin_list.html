<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org.">
<head>
    <title>管理者一覧</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            width: 90%;
            margin: 0 auto;
            padding: 20px;
        }

        .logo {
            font-size: 36px;
            font-weight: bold;
            padding: 15px;
            margin: 10px 0;
            background-color: #d0e7ff;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            display: inline-block;
        }

        .logo:hover {
            background-color: #aacbe5;
        }

        h2 {
            margin-top: 20px;
        }

        .admin-list {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .admin-list th, .admin-list td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
        }

        .admin-list th {
            background-color: #e0f0ff;
        }

        .admin-list tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .admin-list a {
            text-decoration: none;
            color: #007bff;
        }

        .admin-list a:hover {
            text-decoration: underline;
        }

        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        .button {
            background-color: #d0e7ff;
            border: 1px solid #aaa;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 18px;
            color: #333;
            text-decoration: none;
            text-align: center;
        }

        .button:hover {
            background-color: #aacbe5;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ロゴ -->
        <a th:href="@{/main}" class="logo">geek商品管理システム</a>
		<!-- 成功メッセージ表示 -->
		<div th:if="${message}" style="color: green; font-weight: bold; margin: 15px 0;">
		    <p th:text="${message}"></p>
		</div>
        <h2>管理者一覧</h2>

        <table class="admin-list">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>姓</th>
                    <th>名</th>
                    <th>店舗</th>
                    <th>権限</th>
                    <th>役職</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="admin : ${admins}">
                    <td><a th:href="@{'/admin/manage/' + ${admin.id}}" th:text="${admin.id}"></a></td>
                    <td th:text="${admin.lastName}"></td>
                    <td th:text="${admin.firstName}"></td>
                    <td th:text="${admin.store.name}"></td>
                    <td th:text="${admin.role.name}"></td>
                    <td th:text="${admin.position.name}"></td>
                </tr>
            </tbody>
        </table>

        <!-- ボタン群：新規作成 → 戻る -->
		<!-- 管理者だけに新規作成ボタンを表示 -->
		<div class="button-group">
		    <a sec:authorize="hasAuthority('管理者')" th:href="@{/admin/manage/create}" class="button">新規作成</a>
		    <a th:href="@{/main}" class="button">戻る</a>
		</div>
    </div>
</body>
</html>

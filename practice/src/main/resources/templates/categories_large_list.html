<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>大カテゴリー一覧</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            width: 90%;
            margin: 0 auto;
            padding: 20px;
        }

        .logo {
            font-size: 36px;
            font-weight: bold;
            padding: 15px;
            margin: 10px 0;
            background-color: #d0e7ff;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            display: inline-block;
        }

        .logo:hover {
            background-color: #aacbe5;
        }

        h2 {
            margin-top: 20px;
        }

        .category-list {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .category-list th, .category-list td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
        }

        .category-list th {
            background-color: #e0f0ff;
        }

        .category-list tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .category-list a {
            text-decoration: none;
            color: #007bff;
        }

        .category-list a:hover {
            text-decoration: underline;
        }

        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        .button {
            background-color: #d0e7ff;
            border: 1px solid #aaa;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 18px;
            color: #333;
            text-decoration: none;
            text-align: center;
        }

        .button:hover {
            background-color: #aacbe5;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- ロゴ -->
    <a th:href="@{/main}" class="logo">geek商品管理システム</a>

    <h2>大カテゴリー一覧</h2>

    <table class="category-list">
        <thead>
        <tr>
            <th>ID</th>
            <th>カテゴリー名</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="large : ${largeCategories}">
            <td>
                <a th:href="@{'/categories/large/' + ${large.id} + '/middle'}"
                   th:text="${large.id}"></a>
            </td>
            <td th:text="${large.name}"></td>
        </tr>
        </tbody>
    </table>

    <!-- 戻るボタン -->
    <div class="button-group">
        <a th:href="@{/main}" class="button">戻る</a>
    </div>
</div>
</body>
</html>

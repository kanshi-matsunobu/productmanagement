<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>店舗編集</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            width: 80%;
            margin: 0 auto;
            padding: 20px;
        }

        .logo {
            font-size: 36px;
            font-weight: bold;
            padding: 15px;
            margin: 10px;
            background-color: #d0e7ff;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            display: inline-block;
        }

        .logo:hover {
            background-color: #aacbe5;
        }

        h2 {
            margin: 20px 0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: inline-block;
            width: 100px;
            font-weight: bold;
        }

        input[type="text"] {
            padding: 8px;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .button-group {
            margin-top: 25px;
            display: flex;
            gap: 20px;
        }

        .button {
            background-color: #d0e7ff;
            border: 1px solid #aaa;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            color: #333;
            transition: background-color 0.2s ease;
        }

        .button:hover {
            background-color: #aacbe5;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ロゴ -->
        <a th:href="@{/main}" class="logo">geek商品管理システム</a>

        <h2>店舗情報の編集</h2>

        <form th:action="@{/store/edit}" method="post">
            <!-- IDをhiddenで送信 -->
            <input type="hidden" name="id" th:value="${store.id}" />

            <div class="form-group">
                <label>店舗名：</label>
                <input type="text" name="name" th:value="${store.name}" required />
            </div>

            <div class="form-group">
                <label>住所：</label>
                <input type="text" name="address" th:value="${store.address}" required />
            </div>

            <div class="button-group">
                <button type="submit" class="button">保存</button>
                <a th:href="@{/store/detail}" class="button">戻る</a>
            </div>
        </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>メーカー詳細</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            width: 80%;
            margin: 0 auto;
            padding: 20px;
        }

        .logo {
            font-size: 36px;
            font-weight: bold;
            padding: 15px;
            margin: 10px 0;
            background-color: #d0e7ff;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            display: inline-block;
        }

        .logo:hover {
            background-color: #aacbe5;
        }

        h2 {
            margin-top: 20px;
        }

        .detail-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: white;
        }

        .detail-table th, .detail-table td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: left;
        }

        .detail-table th {
            width: 20%;
            background-color: #e0f0ff;
        }

        .button-group {
            margin-top: 20px;
        }

        .button {
            background-color: #d0e7ff;
            border: 1px solid #aaa;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            color: #333;
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
            margin-right: 10px;
        }

        .button:hover {
            background-color: #aacbe5;
        }
    </style>
</head>
<body>
<div class="container">

    <!-- ロゴ -->
    <a th:href="@{/main}" class="logo">geek商品管理システム</a>

    <h2>メーカー詳細</h2>

    <!-- メーカー情報 -->
    <table class="detail-table">
        <tr>
            <th>ID</th>
            <td th:text="${manufacturer.id}">1</td>
        </tr>
        <tr>
            <th>メーカー名</th>
            <td th:text="${manufacturer.name}">メーカー名</td>
        </tr>
    </table>

    <!-- ボタン -->
	<!-- manufacturer_detail.html の下の方に追加（ボタン部分）-->
	<div class="button-group" style="display: flex; gap: 10px; margin-top: 20px;">
	    <div sec:authorize="hasAuthority('管理者')" style="display: flex; gap: 10px;">
	        <a th:href="@{/manufacturer/edit/{id}(id=${manufacturer.id})}" class="button">編集</a>

	        <form th:action="@{/manufacturer/delete/{id}(id=${manufacturer.id})}" method="post" 
	              style="display: inline;">
	            <button type="submit" class="button" 
	                    onclick="return confirm('本当に削除しますか？')">削除</button>
	        </form>
	    </div>

	    <a th:href="@{/manufacturer}" class="button">一覧に戻る</a>
	</div>

</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>店舗一覧</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            width: 90%;
            margin: 0 auto;
            padding: 20px;
        }

        .logo {
            font-size: 36px;
            font-weight: bold;
            padding: 15px;
            margin: 10px 0;
            background-color: #d0e7ff;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            display: inline-block;
        }

        .logo:hover {
            background-color: #aacbe5;
        }

        h2 {
            margin-top: 20px;
        }

        .store-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .store-table th, .store-table td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
        }

        .store-table th {
            background-color: #e0f0ff;
        }

        .store-table tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .store-table a {
            text-decoration: none;
            color: #007bff;
        }

        .store-table a:hover {
            text-decoration: underline;
        }

        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        .button {
            background-color: #d0e7ff;
            border: 1px solid #aaa;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 18px;
            color: #333;
            text-decoration: none;
            text-align: center;
        }

        .button:hover {
            background-color: #aacbe5;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ロゴ -->
        <a th:href="@{/main}" class="logo">geek商品管理システム</a>

        <h2>店舗一覧</h2>

        <table class="store-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>店舗名</th>
                    <th>住所</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="store : ${stores}">
                    <td>
                        <a th:href="@{'/store/edit/' + ${store.id}}" th:text="${store.id}"></a>
                    </td>
                    <td th:text="${store.name}"></td>
                    <td th:text="${store.address}"></td>
                </tr>
            </tbody>
        </table>

        <div class="button-group">
            <a th:href="@{/main}" class="button">戻る</a>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>店舗管理</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            width: 80%;
            margin: 0 auto;
            padding: 20px;
        }

        h2 {
            margin-bottom: 20px;
        }

        .store-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .store-item {
            display: flex;
            gap: 30px;
            align-items: center;
            background-color: #d0e7ff;
            padding: 10px;
            border-radius: 5px;
        }

        .store-item span {
            font-size: 18px;
            margin-right: 10px;
        }

        .store-item a {
            text-decoration: underline;
            color: blue;
        }

        .logo {
            font-size: 36px;
            font-weight: bold;
            padding: 15px;
            margin: 10px;
            background-color: #d0e7ff;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
        }

        .logo:hover {
            color: #666;
        }

        .button-group {
            margin-top: 20px;
        }

        .button {
            background-color: #d0e7ff;
            border: 1px solid #aaa;
            padding: 8px 15px;
            border-radius: 5px;
            text-align: center;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            color: #333;
        }

        .button:hover {
            background-color: #aacbe5;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ロゴ -->
        <a th:href="@{/main}" class="logo">geek商品管理システム</a>

        <h2>店舗管理</h2>
        <div class="store-list">
            <div class="store-item" th:each="store : ${stores}">
                <!-- 店舗IDをリンク化 -->
                <span>
					店舗ID:
                    <a th:href="@{/store/edit/{id}(id=${store.id})}">
                        <span th:text="${store.id}"></span>
                    </a>
                </span>
                <span>店舗名: <span th:text="${store.name}"></span></span>
                <span>住所: <span th:text="${store.address}"></span></span>
            </div>
        </div>

        <!-- 戻るボタンのみ -->
        <div class="button-group">
            <a th:href="@{/main}" class="button">戻る</a>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>発注履歴</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            width: 80%;
            margin: 0 auto;
            padding: 20px;
        }

        .logo {
            font-size: 36px;
            font-weight: bold;
            padding: 15px;
            margin: 10px 0;
            background-color: #d0e7ff;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            display: inline-block;
        }

        .logo:hover {
            background-color: #aacbe5;
        }

        h2 {
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #e0f0ff;
        }

        .button-group {
            margin-top: 20px;
        }

        .button {
            background-color: #d0e7ff;
            border: 1px solid #aaa;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            color: #333;
            text-decoration: none;
            cursor: pointer;
        }

        .button:hover {
            background-color: #aacbe5;
        }
    </style>
</head>
<body>
<div class="container">
    <a th:href="@{/main}" class="logo">geek商品管理システム</a>

    <h2>発注履歴</h2>

    <table>
        <thead>
            <tr>
                <th>商品名</th>
                <th>発注数</th>
                <th>合計金額</th>
                <th>発注日時</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.product.name}">商品名</td>
                <td th:text="${order.orderQuantity}">0</td>
                <td th:text="${order.totalPrice} + ' 円'">0 円</td>
				<td th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
            </tr>
        </tbody>
    </table>

    <div class="button-group">
        <a th:href="@{/main}" class="button">戻る</a>
    </div>
</div>
</body>
</html>

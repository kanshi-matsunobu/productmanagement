<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>プロフィール</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            width: 80%;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 36px;
            font-weight: bold;
            padding: 15px;
            margin: 10px;
            background-color: #d0e7ff;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
        }

        .logo:hover {
            background-color: #aacbe5;
        }

        h2 {
            margin-bottom: 20px;
        }

        .profile {
            background-color: #d0e7ff;
            padding: 15px;
            border-radius: 8px;
        }

        .profile p {
            margin: 8px 0;
        }

        .button-group {
            margin-top: 20px;
        }

        .button {
            background-color: #d0e7ff;
            border: 1px solid #aaa;
            padding: 8px 12px;
            border-radius: 5px;
            text-align: center;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            color: #333;
            margin-right: 10px;
        }

        .button:hover {
            background-color: #aacbe5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <!-- ロゴ（クリックでメイン画面へ遷移） -->
            <a th:href="@{/main}" class="logo">geek商品管理システム</a>
        </div>

        <h2>プロフィール</h2>
        <div class="profile">
            <p>姓: <span th:text="${admin.lastName}"></span></p>
            <p>名: <span th:text="${admin.firstName}"></span></p>
            <p>メール: <span th:text="${admin.email}"></span></p>
            <p>電話番号: <span th:text="${admin.phoneNumber}"></span></p>
            <p>店舗: <span th:text="${admin.store.name}"></span></p>
            <p>権限: <span th:text="${admin.role.name}"></span></p>
            <p>役職: <span th:text="${admin.position.name}"></span></p>
        </div>
        <div class="button-group">
            <a th:href="@{/profile/edit}" class="button">編集</a>
            <a th:href="@{/main}" class="button">戻る</a>
        </div>
    </div>
</body>
</html>
